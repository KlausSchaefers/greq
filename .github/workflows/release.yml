name: Build and Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: greq
            archive_name: greq
            
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: greq.exe
            archive_name: greq.exe
            
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            bin: greq
            archive_name: greq
            
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: greq
            archive_name: greq

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "[target.aarch64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo "linker = \"aarch64-linux-gnu-gcc\"" >> ~/.cargo/config.toml

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package binary  
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            cp ${{ matrix.platform.bin }} ../../../${{ matrix.platform.archive_name }}
          else
            cp ${{ matrix.platform.bin }} ../../../${{ matrix.platform.archive_name }}
          fi
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: ${{ matrix.platform.archive_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        run: |
          find . -name "greq*" -type f
          
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release of greq - Grep + Query search tool
            
            ## Quick Install
            ```bash
            curl -sSL https://raw.githubusercontent.com/KlausSchaefers/greq/main/install.sh | bash
            ```
            
            ## Manual Downloads
            - **Linux x86_64**: `greq-linux-x86_64` 
            - **Linux ARM64**: `greq-linux-arm64`
            - **Windows**: `greq-windows-x86_64.exe`
            - **macOS Intel**: `greq-macos-intel`
            - **macOS Apple Silicon**: `greq-macos-arm64`
            
            ## Usage
            ```bash
            # Make executable (Linux/macOS)
            chmod +x greq
            
            # macOS: Remove security quarantine if needed
            xattr -d com.apple.quarantine greq
            
            # Example usage
            ./greq "search term" /path/to/search --n 5 -m -l
            ```
            
            **Note for macOS users**: If you get "cannot be verified" error, run `xattr -d com.apple.quarantine greq` to remove the quarantine attribute.
          draft: false
          prerelease: false

      - name: Upload Linux x86_64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Linux x86_64/greq
          asset_name: greq-linux-x86_64
          asset_content_type: application/octet-stream

      - name: Upload Windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Windows x86_64/greq.exe
          asset_name: greq-windows-x86_64.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Intel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./macOS Intel/greq
          asset_name: greq-macos-intel
          asset_content_type: application/octet-stream

      - name: Upload macOS ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./macOS ARM64/greq
          asset_name: greq-macos-arm64
          asset_content_type: application/octet-stream